<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SentinelNet Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar">
    <h2>SentinelNet Cyber Defense Dashboard</h2>
    <div>
      <button onclick="fetchAll()">Refresh Data</button>
    </div>
  </nav>

  <div class="container grid">
    <div class="col-left">
      <section>
        <h3>Connected Devices</h3>
        <table id="deviceTable">
          <thead>
            <tr>
              <th>Device ID</th>
              <th>IP Address</th>
              <th>MAC Address</th>
              <th>Hostname</th>
              <th>Last Seen</th>
              <th>Status</th>
              <th>Risk</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section>
        <h3>Security Events</h3>
        <table id="eventTable">
          <thead>
            <tr>
              <th>Event ID</th>
              <th>Device ID</th>
              <th>Type</th>
              <th>Time</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>

    <div class="col-right">
      <section>
        <h3>Risk Summary</h3>
        <div class="cards">
          <div class="card" id="card-safe">Safe<br><span id="safe-count">0</span></div>
          <div class="card" id="card-susp">Suspicious<br><span id="susp-count">0</span></div>
          <div class="card" id="card-high">High Risk<br><span id="high-count">0</span></div>
        </div>
      </section>

      <section>
        <h3>Top Risky Devices</h3>
        <table id="riskTable">
          <thead>
            <tr><th>Device</th><th>Score</th><th>Reason</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section>
        <h3>Risk Timeline</h3>
        <label for="deviceSelect">Select Device:</label>
        <select id="deviceSelect" onchange="drawSelectedDeviceChart()"></select>
        <canvas id="riskChart" width="400" height="250"></canvas>
      </section>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
